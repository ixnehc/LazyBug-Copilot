<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mcp Tool Tip</title>
    
    <!-- 本地 CSS 文件 -->
    <link rel="stylesheet" href="../CommonHtml/tag-common.css">
    <link rel="stylesheet" href="./ChatCtrlHtml/variables.css">
    <link rel="stylesheet" href="./ChatCtrlHtml/messages.css">
    
    <!-- CDN 库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs2015.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/cpp.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-color);
            background: var(--body-bg);
            padding: 6px 10px;
            overflow: auto;
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        
        .tool-content {
            background: var(--body-bg);
            font-size: 13px;
            color: var(--text-color);
            overflow: visible;
            padding: 8px 12px;
            border-radius: 8px;
            flex: 0 0 auto;
        }
        
        .tool-content > * {
            margin-top: 0;
            margin-bottom: 0;
        }
        
.tool-content > * + * {
            margin-top: 0.05em;
        }
        
        .tool-content p {
            margin: 0.3em 0;
        }
        
        /* 代码样式 */
.tool-content pre {
            background-color: var(--code-bg);
            border: 1px solid var(--code-border);
            border-radius: 4px;
            padding: 12px;
            overflow-x: auto;
            font-family: "Sarasa Term SC", "Sarasa Gothic SC", Consolas, "Courier New", "NSimSun", "SimSun", monospace;
            font-size: 12px;
            color: var(--code-text-color);
            white-space: pre;
            margin: 0.5em 0;
        }
        
        .tool-content code {
            font-family: "Sarasa Term SC", "Sarasa Gothic SC", Consolas, "Courier New", "NSimSun", "SimSun", monospace;
            background-color: var(--code-bg);
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-size: 12px;
            color: var(--code-text-color);
        }
        
        .tool-content pre code {
            background-color: transparent;
            padding: 0;
            font-size: inherit;
        }
        
        /* 表格样式 */
        .tool-content table {
            border-collapse: collapse;
            width: auto;
            margin-bottom: 1em;
            border: 1px solid var(--code-border);
        }
        
        .tool-content th, .tool-content td {
            border: 1px solid var(--code-border);
            padding: 8px 12px;
            text-align: left;
        }
        
        .tool-content th {
            background-color: var(--ai-message-bg);
        }
        
        /* 引用样式 */
        .tool-content blockquote {
            border-left: 3px solid var(--blockquote-border);
            margin-left: 0;
            padding-left: 15px;
            color: #aaa;
        }
        
        /* 列表样式 */
        .tool-content ul, .tool-content ol {
            padding-left: 20px;
            margin: 0.5em 0;
        }
        
        .tool-content li {
            margin-bottom: 0.1em;
        }
        
        /* 标题样式 */
.tool-content h1, .tool-content h2, .tool-content h3,
        .tool-content h4, .tool-content h5, .tool-content h6 {
            margin-top: 0.4em;
            margin-bottom: 0.2em;
            color: var(--text-color);
            font-weight: 600;
        }
        
.tool-content h1 { font-size: 18px; }
        .tool-content h2 { font-size: 18px; color: #66ccff; }
        .tool-content h3 { font-size: 14px; }
        .tool-content h4 { font-size: 13px; }
        .tool-content h5 { font-size: 13px; }
        .tool-content h6 { font-size: 12px; }
        
        .tool-content strong {
            font-weight: 600;
            color: var(--text-color);
        }
        
        .tool-content em {
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="tool-content" id="toolContent"></div>

    <script>
        function markdownToHtml(md) {
            if (!md) return '';
            
            let html = marked.parse(md, {
                breaks: true,
                gfm: true
            });
            
            html = DOMPurify.sanitize(html);
            
            const codeBlocks = document.createElement('div');
            codeBlocks.innerHTML = html;
            codeBlocks.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });
            
            return codeBlocks.innerHTML;
        }
        
        function reportContentSize(maxContentWidth, minContentWidth) {
            const el = document.getElementById('toolContent');
            const bodyStyle = getComputedStyle(document.body);
            const padX = parseFloat(bodyStyle.paddingLeft) + parseFloat(bodyStyle.paddingRight);
            const padY = parseFloat(bodyStyle.paddingTop) + parseFloat(bodyStyle.paddingBottom);

            // content可用宽度范围（已扣除body padding）
            const maxW = (maxContentWidth || 800) - padX;
            const minW = Math.max(1, (minContentWidth || 1) - padX);

            // 用脱离正常流的克隆节点测量，避免被body(flex/固定宽度)约束
            const probe = el.cloneNode(true);
            probe.id = '';
            probe.style.position = 'fixed';
            probe.style.left = '-99999px';
            probe.style.top = '0';
            probe.style.flex = '0 0 auto';
            probe.style.display = 'inline-block';
            probe.style.width = 'auto';
            probe.style.maxWidth = maxW + 'px';
            probe.style.visibility = 'hidden';
            document.body.appendChild(probe);

            // 1) 自然宽度（受maxWidth约束）
            let naturalW = probe.scrollWidth;
            // 2) clamp到[minW, maxW]
            let finalW = Math.min(Math.max(naturalW, minW), maxW);
            // 3) 固定最终宽度测换行后的高度
            probe.style.display = 'block';
            probe.style.width = finalW + 'px';
            probe.style.maxWidth = finalW + 'px';
            let finalH = probe.scrollHeight;

            document.body.removeChild(probe);

            const width = Math.ceil(finalW + padX) + 2;
            const height = Math.ceil(finalH + padY) + 2;
            window.chrome.webview.postMessage(JSON.stringify({
                action: 'contentSize',
                data: { width: width, height: height }
            }));
        }
        
        window.chrome.webview.addEventListener('message', function(e) {
            try {
                const msg = (typeof e.data === 'string') ? JSON.parse(e.data) : e.data;
                if (msg.action === 'setToolContent' && msg.data) {
                    const contentHtml = markdownToHtml(msg.data.content || '');
                    document.getElementById('toolContent').innerHTML = contentHtml;
                    const maxW = msg.data.maxContentWidth;
                    const minW = msg.data.minContentWidth;
                    // 等待布局完成后测量并回传尺寸
                    requestAnimationFrame(function() {
                        requestAnimationFrame(function() {
                            reportContentSize(maxW, minW);
                        });
                    });
                }
            } catch (err) {
                console.error('Failed to parse message:', err);
            }
        });
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                window.chrome.webview.postMessage(JSON.stringify({ action: 'escapePressed' }));
            }
        });
    </script>
</body>
</html>
