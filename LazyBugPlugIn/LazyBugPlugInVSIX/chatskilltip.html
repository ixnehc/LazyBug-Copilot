<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Tip</title>
    
    <!-- 本地 CSS 文件 -->
    <link rel="stylesheet" href="../CommonHtml/tag-common.css">
    <link rel="stylesheet" href="./ChatCtrlHtml/variables.css">
    <link rel="stylesheet" href="./ChatCtrlHtml/messages.css">
    
    <!-- CDN 库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs2015.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/cpp.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 12px;
            line-height: 1.4;
            color: var(--text-color);
            background: var(--body-bg);
            padding: 10px;
            overflow: hidden;
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        
        .skill-header {
            background: var(--ai-message-bg);
            border: 1px solid var(--code-border);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        
        .skill-content {
            background: var(--body-bg);
            font-size: 11px;
            color: var(--text-color);
            overflow: hidden;
            padding: 8px 12px;
            border-radius: 8px;
            flex: 1;
        }
        
        /* 使用 message-content 样式来渲染 Markdown 内容 */
        .skill-content {
            /* 继承 messages.css 中的样式 */
        }
        
        .skill-content > * {
            margin-top: 0;
            margin-bottom: 0;
        }
        
        .skill-content > * + * {
            margin-top: 0.1em;
        }
        
        .skill-content p {
            margin: 0.5em 0;
        }
        
        .skill-name {
            font-size: 16px;
            font-weight: 600;
            color: #ffaa33;
            margin-bottom: 4px;
        }
        
        .skill-description {
            font-size: 13px;
            color: #aaa;
        }
        
        /* 代码样式 - 使用 messages.css 中的变量 */
        .skill-content pre {
            background-color: var(--code-bg);
            border: 1px solid var(--code-border);
            border-radius: 4px;
            padding: 12px;
            overflow-x: auto;
            font-family: "Sarasa Term SC", "Sarasa Gothic SC", Consolas, "Courier New", "NSimSun", "SimSun", monospace;
            font-size: 10px;
            color: var(--code-text-color);
            white-space: pre;
            margin: 0.5em 0;
        }
        
        .skill-content code {
            font-family: "Sarasa Term SC", "Sarasa Gothic SC", Consolas, "Courier New", "NSimSun", "SimSun", monospace;
            background-color: var(--code-bg);
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-size: 10px;
            color: var(--code-text-color);
        }
        
        .skill-content pre code {
            background-color: transparent;
            padding: 0;
            font-size: inherit;
        }
        
        /* 表格样式 - 使用 messages.css 中的样式 */
        .skill-content table {
            border-collapse: collapse;
            width: auto;
            margin-bottom: 1em;
            border: 1px solid var(--code-border);
        }
        
        .skill-content th, .skill-content td {
            border: 1px solid var(--code-border);
            padding: 8px 12px;
            text-align: left;
        }
        
        .skill-content th {
            background-color: var(--ai-message-bg);
        }
        
        /* 引用样式 */
        .skill-content blockquote {
            border-left: 3px solid var(--blockquote-border);
            margin-left: 0;
            padding-left: 15px;
            color: #aaa;
        }
        
        /* 列表样式 */
        .skill-content ul, .skill-content ol {
            padding-left: 20px;
            margin: 0.5em 0;
        }
        
        .skill-content li {
            margin-bottom: 0.1em;
        }
        
        /* 标题样式 */
        .skill-content h1, .skill-content h2, .skill-content h3,
        .skill-content h4, .skill-content h5, .skill-content h6 {
            margin-top: 0.8em;
            margin-bottom: 0.4em;
            color: var(--text-color);
            font-weight: 600;
        }
        
        .skill-content h1 { font-size: 14px; }
        .skill-content h2 { font-size: 13px; }
        .skill-content h3 { font-size: 12px; }
        .skill-content h4 { font-size: 11px; }
        .skill-content h5 { font-size: 11px; }
        .skill-content h6 { font-size: 10px; }
        
        .skill-content strong {
            font-weight: 600;
            color: var(--text-color);
        }
        
        .skill-content em {
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="skill-header">
        <div class="skill-name" id="skillName">Loading...</div>
        <div class="skill-description" id="skillDescription"></div>
    </div>
    <div class="skill-content" id="skillContent"></div>

    <script>
        // 使用marked解析Markdown，并用DOMPurify净化HTML
        function markdownToHtml(md) {
            if (!md) return '';
            
            // 使用marked解析（使用gfm格式）
            let html = marked.parse(md, {
                breaks: true,
                gfm: true
            });
            
            // 使用DOMPurify净化HTML
            html = DOMPurify.sanitize(html);
            
            // 代码高亮
            const codeBlocks = document.createElement('div');
            codeBlocks.innerHTML = html;
            codeBlocks.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });
            
            return codeBlocks.innerHTML;
        }
        
        // 处理WebView消息
        window.chrome.webview.addEventListener('message', function(e) {
            try {
                // PostWebMessageAsJson发送的消息，e.data已经是解析后的对象
                const msg = (typeof e.data === 'string') ? JSON.parse(e.data) : e.data;
                if (msg.action === 'setSkillContent' && msg.data) {
                    const data = msg.data;
                    
                    // 设置名称
                    document.getElementById('skillName').textContent = data.name || 'Unknown';
                    
                    // 设置描述
                    document.getElementById('skillDescription').textContent = data.description || '';
                    
                    // 设置内容（转换为HTML）
                    const contentHtml = markdownToHtml(data.content || '');
                    document.getElementById('skillContent').innerHTML = contentHtml;
                }
            } catch (err) {
                console.error('Failed to parse message:', err);
            }
        });
        
        // 键盘事件处理
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                window.chrome.webview.postMessage(JSON.stringify({ action: 'escapePressed' }));
            }
        });
    </script>
</body>
</html>
