<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Repair Window</title>
    
    <!-- Prism.js CSS - VS Code Dark Theme -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-vsc-dark-plus.min.css" rel="stylesheet" />
    
    <style>
        body {
            margin: 0;
            padding: 2px; /* 移除body的内边距 */
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.4;
            background-color: #1e1e1e;
            color: #d4d4d4;
            overflow: hidden; /* 避免滚动条影响尺寸计算 */
        }

        #codeContainer {
            white-space: pre;
            word-wrap: normal; /* 不自动换行，保持代码原始格式 */
            tab-size: 4;
            -moz-tab-size: 4;
            -o-tab-size: 4;
            border: none;
            outline: none;
            background-color: #1e1e1e; /* 设置背景色 */
            width: auto; /* 自动宽度 */
            height: auto; /* 自动高度 */
            display: inline-block; /* 使容器紧贴内容 */
            padding: 2px 2px; /* 移除内边距 */
            border-radius: 0px; /* 移除圆角 */
        }

        /* 新增代码的背景色 - 使用更高的优先级和更多选择器 */
        .new-code,
        .new-code *,
        pre .new-code,
        code .new-code,
        .token.new-code,
        span.new-code {
            background-color: rgba(0, 128, 0, 0.3) !important;
        }

        /* 确保新增代码背景色在所有情况下都能显示 */
        .language-cpp .new-code,
        .language-cpp span.new-code {
            background-color: rgba(0, 128, 0, 0.3) !important;
        }

        /* 调整Prism.js样式，保持语法高亮的同时适应我们的布局 */
        pre[class*="language-"] {
            background: #1e1e1e !important; /* 保持背景色 */
            margin: 0 !important;
            padding: 0 !important;
            border: none !important;
            border-radius: 0 !important;
            overflow: visible !important;
            width: auto !important; /* 自动宽度 */
            height: auto !important; /* 自动高度 */
            display: inline-block !important; /* 紧贴内容 */
        }

        code[class*="language-"] {
            background: transparent !important; /* 让pre的背景色显示 */
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace !important;
            font-size: 14px !important;
            line-height: 1.4 !important;
            padding: 0 !important;
            margin: 0 !important;
            white-space: pre !important; /* 保持原始格式，不换行 */
            word-wrap: normal !important;
        }

        /* 确保新增代码背景色优先级最高，但不影响语法高亮的文字颜色 */
        /* 移除重复的样式定义，已在上面统一定义 */
        
        /* 不要覆盖Prism.js的token颜色，让语法高亮正常工作 */
        .token.comment,
        .token.prolog,
        .token.doctype,
        .token.cdata {
            color: #6a9955 !important;
        }
        
        .token.punctuation {
            color: #d4d4d4 !important;
        }
        
        .token.property,
        .token.tag,
        .token.boolean,
        .token.number,
        .token.constant,
        .token.symbol,
        .token.deleted {
            color: #b5cea8 !important;
        }
        
        .token.selector,
        .token.attr-name,
        .token.string,
        .token.char,
        .token.builtin,
        .token.inserted {
            color: #ce9178 !important;
        }
        
        .token.operator,
        .token.entity,
        .token.url,
        .language-css .token.string,
        .style .token.string {
            color: #d4d4d4 !important;
        }
        
        .token.atrule,
        .token.attr-value,
        .token.keyword {
            color: #569cd6 !important;
        }
        
        .token.function,
        .token.class-name {
            color: #dcdcaa !important;
        }
        
        .token.regex,
        .token.important,
        .token.variable {
            color: #d16969 !important;
        }
    </style>
</head>
<body>
    <div id="codeContainer"></div>

    <!-- Prism.js JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>

    <script>
        // ===== 日志功能 =====
        // 发送日志到VS Output窗口
        function logToVS(msg) {
            if (window.chrome && window.chrome.webview) {
                // 直接传递JavaScript对象，不要JSON.stringify
                window.chrome.webview.postMessage({
                    action: 'log',
                    data: msg
                });
            }
        }

        // 重写console方法，同时输出到浏览器控制台和VS Output
        const originalConsoleLog = console.log;
        const originalConsoleError = console.error;
        const originalConsoleWarn = console.warn;
        
        console.log = function(...args) {
            // 调用原始console.log
            originalConsoleLog.apply(console, args);
            // 发送到VS Output
            const message = args.map(arg => 
                typeof arg === 'object' ? JSON.stringify(arg) : String(arg)
            ).join(' ');
            logToVS('[LOG] ' + message);
        };
        
        console.error = function(...args) {
            // 调用原始console.error
            originalConsoleError.apply(console, args);
            // 发送到VS Output
            const message = args.map(arg => 
                typeof arg === 'object' ? JSON.stringify(arg) : String(arg)
            ).join(' ');
            logToVS('[ERROR] ' + message);
        };
        
        console.warn = function(...args) {
            // 调用原始console.warn
            originalConsoleWarn.apply(console, args);
            // 发送到VS Output
            const message = args.map(arg => 
                typeof arg === 'object' ? JSON.stringify(arg) : String(arg)
            ).join(' ');
            logToVS('[WARN] ' + message);
        };

        // ===== 代码显示功能 =====
        // 设置代码内容 - 修复版本
        function setCodeContent(data) {
            const container = document.getElementById('codeContainer');
            if (data.content && data.charTypes) {
                console.log('Setting code content with data:', data);
                
                // 先创建不带标记的纯代码内容
                const codeContent = data.content;
                console.log('Pure code content:', codeContent);
                
                // 创建pre和code元素用于Prism.js高亮
                const preElement = document.createElement('pre');
                const codeElement = document.createElement('code');
                codeElement.className = 'language-cpp';
                codeElement.textContent = codeContent; // 使用textContent而不是innerHTML
                preElement.appendChild(codeElement);
                
                // 清空容器并添加新内容
                container.innerHTML = '';
                container.appendChild(preElement);
                
                console.log('Content added to container, applying syntax highlighting...');
                
                // 强制应用Prism.js语法高亮
                if (typeof Prism !== 'undefined') {
                    console.log('Applying Prism highlighting to element...');
                    Prism.highlightElement(codeElement);
                    console.log('Prism highlighting applied');
                    
                    // 在语法高亮完成后，重新标记新增代码
                    setTimeout(() => {
                        console.log('Post-processing: applying new code highlighting...');
                        applyNewCodeHighlighting(codeElement, data.content, data.charTypes);
                    }, 50); // 给Prism.js一点时间完成渲染
                } else {
                    console.error('Prism is not available');
                }
            } else {
                console.log('No content data provided, clearing container');
                container.innerHTML = '';
            }
        }

        // 在Prism.js高亮后应用新增代码标记
        function applyNewCodeHighlighting(codeElement, originalContent, charTypes) {
            console.log('applyNewCodeHighlighting called');
            console.log('Original content:', originalContent);
            console.log('Char types:', charTypes);
            
            // 获取当前的HTML内容
            const currentHTML = codeElement.innerHTML;
            console.log('Current HTML after Prism:', currentHTML);
            
            // 提取所有文本节点和它们在原始字符串中的位置
            const textNodes = [];
            const walker = document.createTreeWalker(
                codeElement,
                NodeFilter.SHOW_TEXT,
                null,
                false
            );
            
            let node;
            while (node = walker.nextNode()) {
                textNodes.push(node);
            }
            
            console.log('Found text nodes:', textNodes.length);
            
            // 重建字符位置映射
            let charIndex = 0;
            textNodes.forEach((textNode, nodeIndex) => {
                const text = textNode.textContent;
                console.log(`Processing text node ${nodeIndex}: "${text}"`);
                
                let newHTML = '';
                for (let i = 0; i < text.length; i++) {
                    const char = text[i];
                    const isNewCode = charIndex < charTypes.length && charTypes[charIndex];
                    
                    if (isNewCode) {
                        // 查找连续的新增代码段
                        let newCodeSegment = '';
                        let segmentStart = i;
                        while (i < text.length && charIndex < charTypes.length && charTypes[charIndex]) {
                            newCodeSegment += escapeHtml(text[i]);
                            i++;
                            charIndex++;
                        }
                        i--; // 回退一个位置，因为for循环会自动增加
                        console.log(`New code segment in node ${nodeIndex}: "${newCodeSegment}"`);
                        newHTML += `<span class="new-code">${newCodeSegment}</span>`;
                    } else {
                        newHTML += escapeHtml(char);
                        charIndex++;
                    }
                }
                
                // 如果这个文本节点包含新增代码，替换它
                if (newHTML !== escapeHtml(text)) {
                    console.log(`Replacing text node ${nodeIndex} with HTML:`, newHTML);
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = newHTML;
                    
                    // 替换文本节点
                    const parent = textNode.parentNode;
                    while (tempDiv.firstChild) {
                        parent.insertBefore(tempDiv.firstChild, textNode);
                    }
                    parent.removeChild(textNode);
                }
            });
            
            console.log('New code highlighting applied');
            console.log('Final HTML:', codeElement.innerHTML);
        }

        // 标记新增代码 - 修复版本
        function markNewCode(code, charTypes) {
            console.log('markNewCode called with:', {
                codeLength: code.length,
                charTypesLength: charTypes.length,
                code: code,
                charTypes: charTypes
            });
            
            let result = '';
            let i = 0;
            
            while (i < code.length && i < charTypes.length) {
                const char = code[i];
                const isNewCode = charTypes[i];
                
                console.log(`Character ${i}: '${char}' isNewCode: ${isNewCode}`);
                
                if (isNewCode) {
                    // 查找连续的新增代码段
                    let newCodeSegment = '';
                    let segmentStart = i;
                    while (i < code.length && i < charTypes.length && charTypes[i]) {
                        newCodeSegment += escapeHtml(code[i]);
                        i++;
                    }
                    console.log(`New code segment from ${segmentStart} to ${i-1}: "${newCodeSegment}"`);
                    result += `<span class="new-code">${newCodeSegment}</span>`;
                } else {
                    result += escapeHtml(char);
                    i++;
                }
            }
            
            console.log('Final marked HTML:', result);
            return result;
        }

        // HTML转义函数
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 清空内容
        function clearContent() {
            const container = document.getElementById('codeContainer');
            container.innerHTML = '';
        }

        // 获取内容尺寸
        function getContentSize() {
            const container = document.getElementById('codeContainer');
            
            console.log('getContentSize called');
            
            // 确保容器有内容
            if (!container) {
                console.error('Container not found in getContentSize');
                return JSON.stringify({width: 0, height: 0});
            }
            
            if (!container.firstChild) {
                console.warn('Container has no content');
                return JSON.stringify({width: 200, height: 100}); // 返回默认尺寸
            }
            
            console.log('Container has content, calculating size...');
            
            // 获取实际的代码元素（pre > code）
            const preElement = container.querySelector('pre');
            const codeElement = container.querySelector('code');
            
            if (!preElement || !codeElement) {
                console.warn('Pre or code element not found');
                return JSON.stringify({width: 200, height: 100});
            }
            
            console.log('Found pre and code elements');
            
            // 临时创建一个测量容器
            const measureContainer = document.createElement('div');
            measureContainer.style.position = 'absolute';
            measureContainer.style.visibility = 'hidden';
            measureContainer.style.whiteSpace = 'pre';
            measureContainer.style.fontFamily = 'Consolas, Monaco, Courier New, monospace';
            measureContainer.style.fontSize = '14px';
            measureContainer.style.lineHeight = '1.4';
            measureContainer.style.padding = '0';
            measureContainer.style.margin = '0';
            measureContainer.style.border = 'none';
            measureContainer.style.width = 'auto';
            measureContainer.style.height = 'auto';
            
            // 获取纯文本内容（去除HTML标签）
            const textContent = codeElement.textContent || codeElement.innerText || '';
            measureContainer.textContent = textContent;
            
            console.log('Text content to measure:', JSON.stringify(textContent));
            console.log('Text content length:', textContent.length);
            
            // 添加到body进行测量
            document.body.appendChild(measureContainer);
            
            // 获取实际尺寸
            const width = measureContainer.offsetWidth;
            const height = measureContainer.offsetHeight;
            
            console.log('Measured text dimensions - width:', width, 'height:', height);
            
            // 移除测量容器
            document.body.removeChild(measureContainer);
            
            // 添加一些边距
            const finalWidth = width + 20; // 左右各10px边距
            const finalHeight = height + 10; // 上下各5px边距
            
            console.log('Final dimensions with padding - width:', finalWidth, 'height:', finalHeight);
            
            const result = JSON.stringify({width: finalWidth, height: finalHeight});
            console.log('Final size result:', result);
            return result;
        }


        // 请求尺寸并显示窗口
        function requestSizeAndShow() {
            console.log('requestSizeAndShow function called');
            
            // 检查容器是否存在
            const container = document.getElementById('codeContainer');
            if (!container) {
                console.error('Code container not found');
                return;
            }
            
            console.log('Container found, checking content...');
            console.log('Container innerHTML length:', container.innerHTML.length);
            console.log('Container first 100 chars:', container.innerHTML.substring(0, 100));
            
            // 等待一小段时间确保内容渲染完成
            setTimeout(() => {
                console.log('Starting size calculation...');
                const sizeResult = getContentSize();
                console.log('Content size calculated:', sizeResult);
                
                // 发送尺寸信息给C++端
                if (window.chrome && window.chrome.webview) {
                    // 解析sizeResult字符串为对象
                    const sizeObj = JSON.parse(sizeResult);
                    const messageToSend = {
                        action: 'contentSizeReady',
                        data: sizeObj
                    };
                    console.log('Sending message to C++:', JSON.stringify(messageToSend));
                    
                    // 直接传递JavaScript对象
                    window.chrome.webview.postMessage(messageToSend);
                    console.log('contentSizeReady message sent to C++');
                } else {
                    console.error('WebView API not available for sending contentSizeReady');
                }
            }, 200); // 增加等待时间确保渲染完成
        }

        // 监听来自C++的消息
        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.addEventListener('message', function(event) {
                try {
                    console.log('Raw message from C++:', event.data);
                    const message = JSON.parse(event.data);
                    console.log('Parsed message from C++:', message);
                    
                    switch (message.action) {
                        case 'initializeComplete':
                            console.log('Initialize complete received');
                            // 初始化完成，可以进行一些初始化操作
                            break;
                            
                        case 'setCodeContent':
                            console.log('Setting code content');
                            if (message.data) {
                                setCodeContent(message.data);
                            }
                            break;
                            
                        case 'clearContent':
                            console.log('Clearing content');
                            clearContent();
                            break;
                            
                        case 'requestSizeAndShow':
                            console.log('Request size and show received');
                            requestSizeAndShow();
                            break;
                            
                        default:
                            console.log('Unknown message action:', message.action);
                            break;
                    }
                } catch (e) {
                    console.error('Error parsing message from C++:', e, 'Raw data:', event.data);
                }
            });
            console.log('Message event listener added successfully');
        } else {
            console.error('WebView API not available for message listening');
        }

        // 页面加载完成后的初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOMContentLoaded event fired');
            
            // 等待Prism.js完全加载
            function waitForPrism() {
                if (typeof Prism !== 'undefined') {
                    console.log('Prism.js loaded successfully');
                    
                    // 配置Prism.js自动加载器
                    if (Prism.plugins && Prism.plugins.autoloader) {
                        Prism.plugins.autoloader.languages_path = 'https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/';
                        console.log('Prism.js autoloader configured');
                    }
                    
                    // 确保C++语言支持已加载
                    if (!Prism.languages.cpp && Prism.languages.c) {
                        console.log('Setting up C++ language support');
                        Prism.languages.cpp = Prism.languages.extend('c', {
                            'class-name': {
                                pattern: /(\b(?:class|struct|enum|union)\s+)\w+/i,
                                lookbehind: true
                            },
                            'keyword': /\b(?:alignas|alignof|asm|auto|bool|break|case|catch|char|char16_t|char32_t|class|compl|const|constexpr|const_cast|continue|decltype|default|delete|do|double|dynamic_cast|else|enum|explicit|export|extern|false|final|float|for|friend|goto|if|inline|int|long|mutable|namespace|new|noexcept|nullptr|operator|override|private|protected|public|register|reinterpret_cast|return|short|signed|sizeof|static|static_assert|static_cast|struct|switch|template|this|thread_local|throw|true|try|typedef|typeid|typename|union|unsigned|using|virtual|void|volatile|wchar_t|while)\b/,
                            'number': /(?:\b0b[01']+|\b0x(?:[\da-f']*\.)?[\da-f']+(?:p[+-]?\d'*\d*)?|(?:\b\d'*\d*\.?\d'*\d*|\B\.\d'*\d*)(?:e[+-]?\d'*\d*)?)[ful]*/i,
                            'operator': />>=?|<<=?|->|([-+&|:])\1|[?:~]|[-+*/%&|^!=<>]=?/,
                            'boolean': /\b(?:true|false)\b/
                        });
                    }
                    
                    // 通知C++端页面已准备就绪
                    if (window.chrome && window.chrome.webview) {
                        window.chrome.webview.postMessage({
                            action: 'pageReady'
                        });
                        console.log('Page ready message sent to C++');
                    } else {
                        console.log('WebView API not available');
                    }
                } else {
                    console.log('Waiting for Prism.js to load...');
                    setTimeout(waitForPrism, 100);
                }
            }
            
            // 开始等待Prism.js加载
            waitForPrism();
        });
    </script>
</body>
</html>
