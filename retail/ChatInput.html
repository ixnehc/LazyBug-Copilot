        //====================== 自动补全相关函数 ======================

        function handleAutoComplete() {
            const inputEditor = document.getElementById('inputEditor');
            const selection = window.getSelection();
            
            console.log('handleAutoComplete called');
            
            if (!selection.rangeCount) {
                console.log('No selection range, hiding autocomplete');
                hideAutoComplete();
                return;
            }

            const range = selection.getRangeAt(0);
            if (!range.collapsed) {
                console.log('Range not collapsed, hiding autocomplete');
                hideAutoComplete();
                return;
            }

            // 查找当前光标前的@符号
            const atInfo = findAtSymbolBeforeCursor(range);
            console.log('atInfo:', atInfo);
            
            if (atInfo) {
                const query = atInfo.query;
                autoCompleteData.query = query;
                
                console.log('Found @ symbol, query:', query);
                
                // 计算@符号的屏幕位置
                const atPosition = getAtSymbolScreenPosition(range, atInfo.atPosition);
                console.log('@ position:', atPosition);
                
                if (!autoCompleteData.isVisible) {
                    // 显示自动补全
                    console.log('Sending autoCompleteShow message');
                    sendMessageToNative({
                        action: 'autoCompleteShow',
                        query: query,
                        position: atPosition
                    });
                } else {
                    // 更新查询
                    console.log('Sending autoCompleteUpdate message');
                    sendMessageToNative({
                        action: 'autoCompleteUpdate',
                        query: query,
                        position: atPosition
                    });
                }
            } else {
                console.log('No @ symbol found, hiding autocomplete');
                hideAutoComplete();
            }
        }

        function findAtSymbolBeforeCursor(range) {
            let container = range.startContainer;
            let offset = range.startOffset;
            
            console.log('findAtSymbolBeforeCursor called');
            console.log('container:', container);
            console.log('offset:', offset);
            console.log('container.nodeType:', container.nodeType);
            
            // 如果容器是元素节点，需要找到实际的文本节点和位置
            if (container.nodeType === Node.ELEMENT_NODE) {
                console.log('Container is element node, finding text node...');
                console.log('childNodes count:', container.childNodes.length);
                
                // 遍历所有子节点，找到包含@符号的文本节点
                const childNodes = Array.from(container.childNodes);
                console.log('childNodes:', childNodes);
                
                // 从后往前查找，因为光标通常在最后
                for (let i = childNodes.length - 1; i >= 0; i--) {
                    const child = childNodes[i];
                    console.log(`Checking child ${i}:`, child, 'nodeType:', child.nodeType);
                    
                    if (child.nodeType === Node.TEXT_NODE && child.textContent.length > 0) {
                        const text = child.textContent;
                        console.log(`Text node content: "${text}"`);
                        
                    // 在这个文本节点中查找@符号
                    const atIndex = text.lastIndexOf('@');
                    if (atIndex !== -1) {
                        console.log('Found @ symbol in text node at position:', atIndex);
                        
                        // 获取@符号后的查询字符串，包括后续文本节点的内容
                        let query = text.substring(atIndex + 1);
                        
                        // 收集光标位置之后的文本（从@符号所在节点开始）
                        // 从当前节点的下一个节点开始，收集所有文本内容直到遇到非word符号
                        for (let j = i + 1; j < childNodes.length; j++) {
                            const nextChild = childNodes[j];
                            console.log(`Checking subsequent child ${j}:`, nextChild);
                            if (nextChild.nodeType === Node.TEXT_NODE) {
                                const nextText = nextChild.textContent;
                                console.log(`Adding text from subsequent node: "${nextText}"`);
                                query += nextText;
                                // 检查是否包含非word符号或非ASCII字符（如中文）
                                if (/[\s\n\r\t]|[^\x00-\x7F]/.test(nextText)) {
                                    console.log('Found non-word or non-ASCII character, stopping collection');
                                    break;
                                }
                            } else {
                                console.log('Encountered non-text node, stopping collection');
                                break;
                            }
                        }
                        
                        console.log('Final query from text nodes:', JSON.stringify(query));
                        
                        return {
                            atPosition: atIndex,
                            query: query,
                            fullText: '@' + query
                        };
                    }
                    }
                }
                
                console.log('No @ symbol found in any text node');
                return null;
            }
            
            if (container.nodeType !== Node.TEXT_NODE) {
                console.log('Container is not a text node after processing');
                return null;
            }

            const text = container.textContent;
            console.log('text content:', JSON.stringify(text));
            console.log('text length:', text.length);
            
            let searchPos = offset - 1;
            
            // 向前搜索@符号，限制搜索范围避免跨越太远
            const maxSearchDistance = 100; // 最多向前搜索100个字符
            let searchDistance = 0;
            
            while (searchPos >= 0 && searchDistance < maxSearchDistance) {
                const char = text[searchPos];
                console.log(`Checking char at pos ${searchPos}: '${char}' (code: ${char.charCodeAt(0)})`);
                
                if (char === '@') {
                    // 找到@符号，提取查询字符串（包括光标之前和之后的部分）
                    let query = text.substring(searchPos + 1, offset);
                    console.log('Found @ symbol at position:', searchPos);
                    console.log('Query (before cursor):', JSON.stringify(query));
                    
                    // 收集光标位置之后的文本（直到遇到非word符号）
                    // 从当前文本节点的光标位置之后开始收集
                    let remainingText = text.substring(offset);
                    console.log('Remaining text in current node:', JSON.stringify(remainingText));
                    
                        // 在当前文本节点中查找非word符号或非ASCII字符的位置
                    const nonWordMatch = remainingText.match(/[\s\n\r\t]|[^\x00-\x7F]/);
                    if (nonWordMatch) {
                        query += remainingText.substring(0, nonWordMatch.index);
                        console.log('Found non-word or non-ASCII char in current node, query:', JSON.stringify(query));
                    } else {
                        query += remainingText;
                        console.log('No non-word or non-ASCII char in current node, query:', JSON.stringify(query));
                        
                        // 继续收集后续文本节点的内容
                        if (container.nextSibling && container.nextSibling.nodeType === Node.TEXT_NODE) {
                            console.log('Checking next sibling...');
                            let nextNode = container.nextSibling;
                            while (nextNode && nextNode.nodeType === Node.TEXT_NODE) {
                                const nextText = nextNode.textContent;
                                console.log(`Adding text from next sibling: "${nextText}"`);
                                
                                // 在后续节点中查找非word符号或非ASCII字符
                                const nonWordMatchNext = nextText.match(/[\s\n\r\t]|[^\x00-\x7F]/);
                                if (nonWordMatchNext) {
                                    query += nextText.substring(0, nonWordMatchNext.index);
                                    console.log('Found non-word char, final query:', JSON.stringify(query));
                                    break;
                                } else {
                                    query += nextText;
                                }
                                nextNode = nextNode.nextSibling;
                            }
                        }
                    }
                    
                    console.log('Final query:', JSON.stringify(query));
                    
                    return {
                        atPosition: searchPos,
                        query: query,
                        fullText: '@' + query
                    };
                } else if (char === ' ' || char === '\n' || char === '\t') {
                    // 遇到明显的单词分隔符时停止搜索
                    console.log('Found word separator, stopping search');
                    break;
                }
                searchPos--;
                searchDistance++;
            }

            // 如果在当前文本节点中没有找到@符号，检查前面的文本节点
            console.log('No @ symbol found in current text node, checking previous siblings...');
            let currentNode = container;
            let totalQuery = text.substring(0, offset); // 当前节点中光标前的所有文本
            
            while (currentNode.previousSibling && searchDistance < maxSearchDistance) {
                const prevNode = currentNode.previousSibling;
                console.log('Checking previous sibling:', prevNode, 'nodeType:', prevNode.nodeType);
                
                if (prevNode.nodeType === Node.TEXT_NODE) {
                    const prevText = prevNode.textContent;
                    console.log('Previous text node content:', JSON.stringify(prevText));
                    
                    // 在前一个文本节点中查找@符号
                    const atIndex = prevText.lastIndexOf('@');
                    if (atIndex !== -1) {
                        console.log('Found @ symbol in previous text node at position:', atIndex);
                        
                        // 构建完整的查询字符串：@符号后的文本 + 中间的文本节点 + 当前节点的文本
                        let query = prevText.substring(atIndex + 1);
                        
                        // 收集@符号所在节点和当前节点之间的所有文本节点
                        let intermediateNode = prevNode.nextSibling;
                        while (intermediateNode && intermediateNode !== container) {
                            if (intermediateNode.nodeType === Node.TEXT_NODE) {
                                query += intermediateNode.textContent;
                                console.log('Adding intermediate text:', JSON.stringify(intermediateNode.textContent));
                            } else {
                                // 如果中间有非文本节点，说明@符号和当前位置不连续
                                console.log('Found non-text node between @ and cursor, stopping');
                                return null;
                            }
                            intermediateNode = intermediateNode.nextSibling;
                        }
                        
                        // 添加当前节点中光标前的文本
                        query += totalQuery;
                        
                        // 收集光标之后的文本（直到遇到非word符号）
                        let remainingText = text.substring(offset);
                        console.log('Remaining text after cursor:', JSON.stringify(remainingText));
                        
                        // 在当前文本节点中查找非word符号的位置
                        const nonWordMatch = remainingText.match(/[\s\n\r\t]|[^\x00-\x7F]/);
                        if (nonWordMatch) {
                            query += remainingText.substring(0, nonWordMatch.index);
                            console.log('Found non-word or non-ASCII char in current node, query:', JSON.stringify(query));
                        } else {
                            query += remainingText;
                            console.log('No non-word or non-ASCII char in current node, query:', JSON.stringify(query));
                            
                            // 继续收集后续文本节点的内容
                            if (container.nextSibling && container.nextSibling.nodeType === Node.TEXT_NODE) {
                                console.log('Checking next siblings for more text...');
                                let nextNode = container.nextSibling;
                                while (nextNode && nextNode.nodeType === Node.TEXT_NODE) {
                                    const nextText = nextNode.textContent;
                                    console.log(`Adding text from next sibling: "${nextText}"`);
                                    
                                    // 在后续节点中查找非word符号或非ASCII字符
                                    const nonWordMatchNext = nextText.match(/[\s\n\r\t]|[^\x00-\x7F]/);
                                    if (nonWordMatchNext) {
                                        query += nextText.substring(0, nonWordMatchNext.index);
                                        console.log('Found non-word or non-ASCII char, final query:', JSON.stringify(query));
                                        break;
                                    } else {
                                        query += nextText;
                                    }
                                    nextNode = nextNode.nextSibling;
                                }
                            }
                        }
                        
                        console.log('Final cross-node query:', JSON.stringify(query));
                        
                        return {
                            atPosition: atIndex,
                            query: query,
                            fullText: '@' + query
                        };
                    }
                    
                    // 将这个节点的文本添加到总查询前面
                    totalQuery = prevText + totalQuery;
                    searchDistance += prevText.length;
                    
                    // 检查是否有单词分隔符
                    if (prevText.includes(' ') || prevText.includes('\n') || prevText.includes('\t')) {
                        console.log('Found word separator in previous text, stopping cross-node search');
                        break;
                    }
                } else {
                    // 遇到非文本节点，停止搜索
                    console.log('Encountered non-text node, stopping cross-node search');
                    break;
                }
                
                currentNode = prevNode;
            }

            console.log('No @ symbol found within search range (including previous siblings)');
            return null;
        }

        function getAtSymbolScreenPosition(range, atPosition) {
            try {
                const container = range.startContainer;
                
                // 创建一个新的Range对象，指向@符号的位置
                const atRange = document.createRange();
                atRange.setStart(container, atPosition);
                atRange.setEnd(container, atPosition);
                
                // 获取@符号的客户端矩形
                const rect = atRange.getBoundingClientRect();
                
                // 返回相对于WebView的位置
                return {
                    x: Math.round(rect.left),
                    y: Math.round(rect.top)
                };
            } catch (e) {
                console.error('Error calculating @ symbol position:', e);
                // 如果计算失败，返回默认位置
                return { x: 0, y: 0 };
            }
        }

        function processAutoCompleteMessage(message) {
            if (message.action === 'showAutoComplete') {
                showAutoComplete(message.items, message.position, message.config, message.selectedIndex, message.query);
            } else if (message.action === 'hideAutoComplete') {
                hideAutoComplete();
            }
        }

        function showAutoComplete(items, position, config, selectedIndex, query) {
            autoCompleteData.isVisible = true;
            autoCompleteData.items = items || [];
            autoCompleteData.selectedIndex = selectedIndex || 0;
            autoCompleteData.query = query || '';
            autoCompleteData.position = position || { x: 0, y: 0 };

            const popup = document.getElementById('autoCompletePopup');
            popup.classList.remove('hidden');
            
            // 设置位置
            popup.style.left = position.x + 'px';
            popup.style.top = position.y + 'px';
            
            // 设置宽度
            if (config && config.width) {
                popup.style.width = config.width + 'px';
            }

            // 构建列表项
            popup.innerHTML = '';
            items.forEach((item, index) => {
                const itemElement = createAutoCompleteItem(item, index === selectedIndex);
                itemElement.addEventListener('click', () => {
                    selectAutoCompleteItem(index);
                    confirmAutoCompleteSelection();
                });
                popup.appendChild(itemElement);
            });

            // 确保选中项可见
            scrollSelectedItemIntoView();
        }

        function createAutoCompleteItem(item, isSelected) {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'autocomplete-item' + (isSelected ? ' selected' : '');
            
            if (item.icon) {
                const iconSpan = document.createElement('span');
                iconSpan.className = 'autocomplete-item-icon';
                iconSpan.innerHTML = item.icon;
                itemDiv.appendChild(iconSpan);
            }

            const contentDiv = document.createElement('div');
            contentDiv.className = 'autocomplete-item-content';
            
            const textDiv = document.createElement('div');
            textDiv.className = 'autocomplete-item-text';
            textDiv.textContent = item.text;
            contentDiv.appendChild(textDiv);
            
            if (item.description) {
                const descDiv = document.createElement('div');
                descDiv.className = 'autocomplete-item-description';
                descDiv.textContent = item.description;
                contentDiv.appendChild(descDiv);
            }
            
            itemDiv.appendChild(contentDiv);
            return itemDiv;
        }

        function hideAutoComplete() {
            if (!autoCompleteData.isVisible) return;
            
            autoCompleteData.isVisible = false;
            const popup = document.getElementById('autoCompletePopup');
            popup.classList.add('hidden');
            
            sendMessageToNative({
                action: 'autoCompleteHide'
            });
        }

        function selectAutoCompleteItem(index) {
            if (index < 0 || index >= autoCompleteData.items.length) return;
            
            autoCompleteData.selectedIndex = index;
            updateAutoCompleteSelection();
            
            sendMessageToNative({
                action: 'autoCompleteSelect',
                index: index
            });
        }

        function selectNextAutoCompleteItem() {
            if (!autoCompleteData.isVisible || autoCompleteData.items.length === 0) return;
            
            let newIndex = autoCompleteData.selectedIndex + 1;
            if (newIndex >= autoCompleteData.items.length) {
                newIndex = 0;
            }
            selectAutoCompleteItem(newIndex);
        }

        function selectPreviousAutoCompleteItem() {
            if (!autoCompleteData.isVisible || autoCompleteData.items.length === 0) return;
            
            let newIndex = autoCompleteData.selectedIndex - 1;
            if (newIndex < 0) {
                newIndex = autoCompleteData.items.length - 1;
            }
            selectAutoCompleteItem(newIndex);
        }

        function confirmAutoCompleteSelection() {
            if (!autoCompleteData.isVisible || 
                autoCompleteData.selectedIndex < 0 || 
                autoCompleteData.selectedIndex >= autoCompleteData.items.length) {
                return;
            }

            sendMessageToNative({
                action: 'autoCompleteConfirm'
            });
        }

        function updateAutoCompleteSelection() {
            const popup = document.getElementById('autoCompletePopup');
            const items = popup.querySelectorAll('.autocomplete-item');
            
            items.forEach((item, index) => {
                if (index === autoCompleteData.selectedIndex) {
                    item.classList.add('selected');
                } else {
                    item.classList.remove('selected');
                }
            });

            scrollSelectedItemIntoView();
        }

        function scrollSelectedItemIntoView() {
            const popup = document.getElementById('autoCompletePopup');
            const selectedItem = popup.querySelector('.autocomplete-item.selected');
            
            if (selectedItem) {
                selectedItem.scrollIntoView({
                    block: 'nearest'
                });
            }
        }

        function getCursorPosition() {
            const selection = window.getSelection();
            if (!selection.rangeCount) {
                return JSON.stringify({ x: 0, y: 0 });
            }

            const range = selection.getRangeAt(0);
            const rect = range.getBoundingClientRect();
            
            return JSON.stringify({
                x: Math.round(rect.left),
                y: Math.round(rect.bottom)
            });
        }

        function replaceAutoCompleteWithTag(prefix, tagData) {
            const inputEditor = document.getElementById('inputEditor');
            
            if (!inputEditor) return;
            
            // 优先使用传入的 prefix 参数来定位 @ 符号
            // prefix 是 @ 符号后的查询文本
            const targetText = '@' + prefix;
            
            // 遍历所有文本节点，查找包含 @prefix 的位置
            const textNodes = [];
            const walk = document.createTreeWalker(inputEditor, NodeFilter.SHOW_TEXT);
            let node;
            while ((node = walk.nextNode())) {
                textNodes.push(node);
            }
            
            // 收集所有文本节点的内容并查找 targetText
            let combinedText = '';
            let foundNode = null;
            let foundOffset = -1;
            
            for (let i = 0; i < textNodes.length; i++) {
                const textNode = textNodes[i];
                const text = textNode.textContent;
                
                // 检查当前文本节点是否包含 @prefix
                const atPos = text.lastIndexOf('@');
                if (atPos !== -1) {
                    // 检查 @ 后的内容是否与 prefix 匹配
                    const afterAt = text.substring(atPos + 1);
                    
                    // 从当前节点开始，收集连续的文本节点来匹配完整的 prefix
                    let accumulatedText = afterAt;
                    let matchEndNode = textNode;
                    let matchEndOffset = text.length;
                    let j = i + 1;
                    
                    while (j < textNodes.length && accumulatedText.length < prefix.length) {
                        const nextTextNode = textNodes[j];
                        // 只收集连续的文本节点
                        if (isTextNodeContinuous(matchEndNode, nextTextNode)) {
                            accumulatedText += nextTextNode.textContent;
                            matchEndNode = nextTextNode;
                            matchEndOffset = nextTextNode.textContent.length;
                            j++;
                        } else {
                            break;
                        }
                    }
                    
                    // 检查是否匹配 prefix（允许前缀匹配，因为用户可能还在输入）
                    if (prefix.indexOf(accumulatedText) === 0 || accumulatedText.indexOf(prefix) === 0) {
                        foundNode = textNode;
                        foundOffset = atPos;
                        
                        // 处理跨节点的替换
                        if (matchEndNode !== textNode) {
                            // 跨多个文本节点的情况
                            _replaceAcrossNodes(textNode, atPos, matchEndNode, matchEndOffset, prefix, tagData);
                            return;
                        }
                        break;
                    }
                }
            }
            
            // 如果没找到跨节点的匹配，使用传统方式
            const selection = window.getSelection();
            if (!selection.rangeCount) return;
            
            const range = selection.getRangeAt(0);
            const container = range.startContainer;
            
            if (container.nodeType !== Node.TEXT_NODE) return;

            const text = container.textContent;
            const offset = range.startOffset;
            
            // 使用 prefix 参数来查找@符号的位置（从后往前找）
            // 查找最近的 @prefix 模式
            let atPos = -1;
            let searchStart = offset;
            
            // 如果 prefix 不为空，尝试匹配 @prefix
            if (prefix.length > 0) {
                const searchText = text.substring(0, searchStart);
                const targetPattern = '@' + prefix;
                atPos = searchText.lastIndexOf(targetPattern);
                
                // 如果没找到完整匹配，尝试只找 @
                if (atPos === -1) {
                    atPos = searchText.lastIndexOf('@');
                }
            } else {
                atPos = text.lastIndexOf('@', offset - 1);
            }
            
            if (atPos === -1) {
                // 最后尝试：在整段文本中查找包含 prefix 的 @
                atPos = text.lastIndexOf('@');
                if (atPos === -1) return;
                
                const afterAt = text.substring(atPos + 1);
                if (prefix.length > 0 && afterAt.indexOf(prefix) !== 0) {
                    // @ 后的文本不匹配 prefix，可能不是我们想要的 @
                    return;
                }
            }

            // 删除@和查询文本
            const beforeAt = text.substring(0, atPos);
            const afterQuery = text.substring(atPos + 1 + prefix.length);
            
            // 更新文本节点
            container.textContent = beforeAt + afterQuery;
            
            // 设置新的光标位置（在@位置）
            const newRange = document.createRange();
            newRange.setStart(container, atPos);
            newRange.collapse(true);
            selection.removeAllRanges();
            selection.addRange(newRange);

            // 插入标签
            const tagElement = createInlineTagElement({
                id: tagData.id || ('ac_' + Date.now()),
                text: tagData.text,
                type: tagData.type || 'autocomplete',
                data: tagData.data || '',
                removable: true
            });

            const zwsp = '\u200B';
            const beforeZwsp = document.createTextNode(zwsp);
            const afterZwsp = document.createTextNode(zwsp);
            
            newRange.insertNode(beforeZwsp);
            newRange.setStartAfter(beforeZwsp);
            newRange.insertNode(tagElement);
            newRange.setStartAfter(tagElement);
            newRange.insertNode(afterZwsp);
            
            // 将光标移动到标签后
            newRange.setStartAfter(afterZwsp);
            newRange.collapse(true);
            selection.removeAllRanges();
            selection.addRange(newRange);
            
            // 隐藏自动补全
            hideAutoComplete();
            
            // 通知内容变化
            notifyContentChanged();
        }
        
        // 辅助函数：检查两个文本节点是否连续（中间没有其他元素）
        function isTextNodeContinuous(node1, node2) {
            if (!node1 || !node2) return false;
            let current = node1.nextSibling;
            while (current) {
                if (current === node2) return true;
                // 如果中间有非空文本节点或非文本节点，认为不连续
                if (current.nodeType === Node.TEXT_NODE && current.textContent.length > 0) {
                    return false;
                }
                if (current.nodeType === Node.ELEMENT_NODE) {
                    // 如果是 <br> 标签，认为不连续
                    if (current.tagName === 'BR') return false;
                    // 如果是行内标签，继续检查
                    if (current.classList && current.classList.contains('inline-tag')) return false;
                }
                current = current.nextSibling;
            }
            return false;
        }
        
        // 辅助函数：处理跨多个文本节点的替换
        function _replaceAcrossNodes(startNode, startOffset, endNode, endOffset, prefix, tagData) {
            const inputEditor = document.getElementById('inputEditor');
            const selection = window.getSelection();
            
            // 处理起始节点：保留 @ 之前的文本
            const startText = startNode.textContent;
            const beforeAt = startText.substring(0, startOffset);
            startNode.textContent = beforeAt;
            
            // 处理结束节点：保留匹配文本之后的文本
            const endText = endNode.textContent;
            const afterQuery = endText.substring(endOffset);
            
            // 创建要插入的内容：标签 + 结束节点的剩余文本
            const tagElement = createInlineTagElement({
                id: tagData.id || ('ac_' + Date.now()),
                text: tagData.text,
                type: tagData.type || 'autocomplete',
                data: tagData.data || '',
                removable: true
            });
            
            // 构建插入序列
            const zwsp = '\u200B';
            const fragment = document.createDocumentFragment();
            const beforeZwsp = document.createTextNode(zwsp);
            const afterZwsp = document.createTextNode(zwsp);
            const afterTextNode = document.createTextNode(afterQuery);
            
            fragment.appendChild(beforeZwsp);
            fragment.appendChild(tagElement);
            fragment.appendChild(afterZwsp);
            if (afterQuery) {
                fragment.appendChild(afterTextNode);
            }
            
            // 找到插入位置：startNode 之后
            let insertPoint = startNode;
            let current = startNode.nextSibling;
            
            // 删除 startNode 和 endNode 之间的所有节点
            while (current && current !== endNode) {
                const next = current.nextSibling;
                if (current.nodeType === Node.TEXT_NODE) {
                    current.remove();
                }
                current = next;
            }
            
            // 处理 endNode：如果 endNode 不是 startNode，修改其内容为剩余文本
            if (endNode !== startNode) {
                endNode.textContent = afterQuery;
                if (afterQuery === '') {
                    endNode.remove();
                }
            }
            
            // 在 insertPoint 后插入 fragment
            insertPoint.parentNode.insertBefore(fragment, insertPoint.nextSibling);
            
            // 设置光标位置
            const newRange = document.createRange();
            if (afterQuery) {
                newRange.setStart(afterTextNode, 0);
            } else {
                newRange.setStartAfter(afterZwsp);
            }
            newRange.collapse(true);
            selection.removeAllRanges();
            selection.addRange(newRange);
            
            // 隐藏自动补全并通知内容变化
            hideAutoComplete();
            notifyContentChanged();
        }

        //====================== MajorChat API 菜单相关函数 ======================

        function handleApiMenuButtonClick(event) {
            event.stopPropagation();
            
            // 获取API按钮的位置
            const apiMenuButton = document.getElementById('apiMenuButton');
            const rect = apiMenuButton.getBoundingClientRect();
            
            // 发送消息给C++显示外部LLM菜单
            sendMessageToNative({
                action: 'showLlmMenu',
                position: {
                    x: rect.left,
                    y: rect.top
                }
            });
        }

        function updateMajorChatApiMenu(currentApi, apis) {
            // 找到当前API的可用性状态
            const currentApiObject = apis.find(api => api.name === currentApi);
            const isCurrentApiAvailable = currentApiObject ? currentApiObject.available : true;
            
            // 更新按钮显示的当前API
            const apiMenuText = document.getElementById('apiMenuText');
            if (apiMenuText) {
                apiMenuText.textContent = currentApi || '选择模型';
                apiMenuText.title = currentApi || '选择模型';

                if (!isCurrentApiAvailable) {
                    apiMenuText.classList.add('unavailable');
                } else {
                    apiMenuText.classList.remove('unavailable');
                }
            }
        }

        // 设置 Context Usage 进度条
        function setContextUsage(progress, tooltip) {
            const usageFill = document.getElementById('contextUsageFill');
            const tooltipElement = document.getElementById('contextUsageTooltip');
            
            if (!usageFill) return;
            
            // 标准化进度值 (0-1)
            let normalizedProgress = progress;
            if (progress > 1) {
                normalizedProgress = progress / 100.0;
            }
            normalizedProgress = Math.max(0, Math.min(1, normalizedProgress));
            
            // 设置高度
            usageFill.style.height = (normalizedProgress * 100) + '%';
            
            // 移除所有颜色类
            usageFill.classList.remove('yellow', 'red');
            
            // 根据进度设置颜色
            if (normalizedProgress > 2/3) {
                usageFill.classList.add('red');
            } else if (normalizedProgress > 1/3) {
                usageFill.classList.add('yellow');
            }
            // 小于 1/3 保持默认绿色
            
            // 更新永久显示的 tooltip
            if (tooltipElement && tooltip) {
                tooltipElement.textContent = tooltip;
            }
        }
    </script>
</body>
</html>
