<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Repair Window</title>
    
    <!-- Prism.js CSS - VS Code Dark Theme -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-vsc-dark-plus.min.css" rel="stylesheet" />
    
    <style>
        body {
            margin: 0;
            padding: 8px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.4;
            background-color: #1e1e1e;
            color: #d4d4d4;
            overflow: auto;
        }

        #codeContainer {
            white-space: pre-wrap;
            word-wrap: break-word;
            tab-size: 4;
            -moz-tab-size: 4;
            -o-tab-size: 4;
            border: none;
            outline: none;
            background: transparent;
            width: 100%;
            min-height: 100%;
        }

        /* 新增代码的背景色 */
        .new-code {
            background-color: rgba(0, 128, 0, 0.3) !important;
        }

        /* 覆盖Prism.js的默认样式以适应我们的主题 */
        pre[class*="language-"] {
            background: transparent !important;
            margin: 0 !important;
            padding: 0 !important;
            border: none !important;
            border-radius: 0 !important;
            overflow: visible !important;
        }

        code[class*="language-"] {
            background: transparent !important;
            color: #d4d4d4 !important;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace !important;
            font-size: 14px !important;
            line-height: 1.4 !important;
        }

        /* 确保新增代码背景色优先级最高 */
        .new-code * {
            background-color: rgba(0, 128, 0, 0.3) !important;
        }
    </style>
</head>
<body>
    <div id="codeContainer"></div>

    <!-- Prism.js JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>

    <script>
        // 设置代码内容
        function setCodeContent(data) {
            const container = document.getElementById('codeContainer');
            if (data.content && data.charTypes) {
                // 创建带有新增代码标记的HTML
                const markedCode = markNewCode(data.content, data.charTypes);
                
                // 创建pre和code元素用于Prism.js高亮
                const preElement = document.createElement('pre');
                const codeElement = document.createElement('code');
                codeElement.className = 'language-cpp';
                codeElement.innerHTML = markedCode;
                preElement.appendChild(codeElement);
                
                // 清空容器并添加新内容
                container.innerHTML = '';
                container.appendChild(preElement);
                
                // 应用Prism.js语法高亮
                Prism.highlightElement(codeElement);
            } else {
                container.innerHTML = '';
            }
        }

        // 标记新增代码
        function markNewCode(code, charTypes) {
            let result = '';
            let i = 0;
            
            while (i < code.length) {
                const char = code[i];
                const isNewCode = charTypes[i];
                
                if (isNewCode) {
                    // 查找连续的新增代码段
                    let newCodeSegment = '';
                    while (i < code.length && charTypes[i]) {
                        newCodeSegment += escapeHtml(code[i]);
                        i++;
                    }
                    result += `<span class="new-code">${newCodeSegment}</span>`;
                } else {
                    result += escapeHtml(char);
                    i++;
                }
            }
            
            return result;
        }

        // HTML转义函数
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 清空内容
        function clearContent() {
            const container = document.getElementById('codeContainer');
            container.innerHTML = '';
        }

        // 获取内容尺寸
        function getContentSize() {
            const container = document.getElementById('codeContainer');
            
            // 确保容器有内容
            if (!container.firstChild) {
                return JSON.stringify({width: 0, height: 0});
            }
            
            // 临时设置容器样式以获取准确尺寸
            const originalStyle = {
                width: container.style.width,
                height: container.style.height,
                overflow: container.style.overflow
            };
            
            // 设置为自动尺寸
            container.style.width = 'auto';
            container.style.height = 'auto';
            container.style.overflow = 'visible';
            
            // 获取滚动尺寸（包含所有内容）
            const width = container.scrollWidth;
            const height = container.scrollHeight;
            
            // 恢复原始样式
            container.style.width = originalStyle.width;
            container.style.height = originalStyle.height;
            container.style.overflow = originalStyle.overflow;
            
            return JSON.stringify({width: width, height: height});
        }


        // 请求尺寸并显示窗口
        function requestSizeAndShow() {
            // 等待一小段时间确保内容渲染完成
            setTimeout(() => {
                const sizeResult = getContentSize();
                // 发送尺寸信息给C++端
                window.chrome.webview.postMessage(JSON.stringify({
                    action: 'contentSizeReady',
                    data: sizeResult
                }));
            }, 100);
        }

        // 监听来自C++的消息
        window.chrome.webview.addEventListener('message', function(event) {
            try {
                const message = JSON.parse(event.data);
                
                switch (message.action) {
                    case 'initializeComplete':
                        // 初始化完成，可以进行一些初始化操作
                        break;
                        
                    case 'setCodeContent':
                        if (message.data) {
                            setCodeContent(message.data);
                        }
                        break;
                        
                    case 'clearContent':
                        clearContent();
                        break;
                        
                    case 'requestSizeAndShow':
                        requestSizeAndShow();
                        break;
                }
            } catch (e) {
                console.error('Error parsing message:', e);
            }
        });

        // 页面加载完成后的初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 配置Prism.js自动加载器
            if (typeof Prism !== 'undefined' && Prism.plugins && Prism.plugins.autoloader) {
                Prism.plugins.autoloader.languages_path = 'https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/';
            }
        });
    </script>
</body>
</html>
