<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Input</title>
    
    <!-- CSS文件 -->
    <link rel="stylesheet" href="../CommonHtml/tag-common.css">
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="tags.css">
    <link rel="stylesheet" href="input.css">
    <link rel="stylesheet" href="toolbar.css">
    <link rel="stylesheet" href="autocomplete.css">
    <link rel="stylesheet" href="api-menu.css">
    <link rel="stylesheet" href="responsive.css">
</head>
<body>
    <div class="chat-input-container">
        <!-- 标签栏 -->
        <div class="tags-bar" id="tagsBar">
            <button class="at-button" id="atButton" title="显示/隐藏标签">📎</button>
            <div class="tags-container" id="tagsContainer"></div>
        </div>
        
        <!-- 编辑区域 -->
        <div class="input-area">
            <div 
                class="input-editor" 
                id="inputEditor" 
                contenteditable="true"
                data-placeholder="Enter your messages..."></div>
            <div class="input-watermark"><span class="keyboard-key">PageUp</span>/<span class="keyboard-key">PageDown</span> to navigate previous inputs</div>
        </div>
        
        <!-- 工具栏 -->
        <div class="toolbar">
            <div class="toolbar-left" id="toolbarLeft">
                <!-- MajorChat API 按钮 -->
                <button class="api-menu-button" id="apiMenuButton">
                    <span class="api-menu-text" id="apiMenuText">选择模型</span>
                    <span class="api-menu-arrow">▼</span>
                </button>
                <!-- 压缩信息容器 -->
                <div class="compress-info-container" id="compressInfoContainer">
                    <button class="compress-button" id="compressButton" title="压缩强度">
                        <span class="compress-icon" id="compressIcon">
                            <svg role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M11.846.007a.8.8 0 0 0-.312.103L.454 6.346a.8.8 0 0 0-.397.855.8.8 0 0 0 .408.78L3.99 9.976 1.033 11.64a.76.76 0 0 0-.374.838c-.033.265.07.541.378.715l10.546 5.967a.8.8 0 0 0 .61.073.8.8 0 0 0 .27-.094l10.548-5.968c.31-.175.412-.454.376-.72a.76.76 0 0 0-.383-.79l-3.01-1.693 3.554-2.012a.8.8 0 0 0 .399-.836.8.8 0 0 0-.412-.753L12.455.13a.8.8 0 0 0-.28-.097.8.8 0 0 0-.227-.033m6.482 10.853 2.78 1.566-9.205 5.21-9.21-5.213 2.76-1.554 5.99 3.387a.83.83 0 0 0 .638.076.8.8 0 0 0 .285-.098zm3.572 6.03a.75.75 0 0 0-.35.098l-9.67 5.47-9.635-5.45a.75.75 0 0 0-1.01.267.717.717 0 0 0 .27.99l9.976 5.644a.75.75 0 0 0 .372.098c.079 0 .294-.026.46-.117l9.978-5.645a.716.716 0 0 0 .27-.99.75.75 0 0 0-.661-.364"/>
                            </svg>
                        </span>
                        <span class="compress-level-badge" id="compressLevelBadge">2</span>
                        <span class="compress-forbidden" id="compressForbidden">⛔</span>
                    </button>
                    <span class="compress-size" id="compressSize">0B</span>
                </div>
                <!-- 工具按钮将通过JavaScript动态添加 -->
            </div>
            <div class="toolbar-right">
                <button class="skill-button" id="skillButton" title="Skill">
                    <span>✨</span>
                </button>
                <button class="send-button" id="sendButton" title="发送">
                    <span>⬆</span>
                </button>
                <button class="stop-button hidden" id="stopButton" title="停止">
                    <span>■</span>
                </button>
            </div>
        </div>
    </div>

    <!-- 自动补全弹出窗口 -->
    <div class="autocomplete-popup hidden" id="autoCompletePopup"></div>

    <!-- JavaScript文件 -->
    <script src="../CommonHtml/tag-utils.js"></script>
    <script src="constants.js"></script>
    <script src="utils.js"></script>
    <script src="native-bridge.js"></script>
    <script src="tags.js"></script>
    <script src="content.js"></script>
    <script src="autocomplete.js"></script>
    <script src="ui-controls.js"></script>
    <script src="main.js"></script>
</body>
</html>
