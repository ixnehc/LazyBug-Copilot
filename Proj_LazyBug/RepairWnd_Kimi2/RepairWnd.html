<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Repair Window</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Consolas', 'Monaco', 'Lucida Console', monospace;
            background-color: #1e1e1e;
            color: #d4d4d4;
            overflow: hidden;
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .code-container {
            flex: 1;
            overflow: auto;
            padding: 10px;
            background-color: #1e1e1e;
        }

        pre {
            margin: 0;
            padding: 0;
            background-color: transparent;
            border: none;
            font-size: 14px;
            line-height: 1.5;
        }

        code {
            background-color: transparent;
            padding: 0;
            font-family: inherit;
        }

        .highlight-new {
            background-color: rgba(76, 175, 80, 0.3) !important;
            border-radius: 2px;
            padding: 1px 2px;
        }

        .highlight-both {
            background-color: rgba(33, 150, 243, 0.2) !important;
            border-radius: 2px;
            padding: 1px 2px;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #666;
            font-style: italic;
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #2d2d30;
        }

        ::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #777;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="code-container">
            <pre><code id="code-content" class="language-cpp"></code></pre>
            <div id="empty-state" class="empty-state" style="display: none;">
                No code to display
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>

    <script>
        // 全局变量
        let currentContent = '';
        let currentHighlights = [];

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 监听来自C++的消息
            window.chrome.webview.addEventListener('message', handleWebMessage);
        });

        // 处理Web消息
        function handleWebMessage(event) {
            try {
                const message = event.data;
                if (message.action === 'setContent') {
                    updateContent(message.data);
                }
            } catch (error) {
                console.error('Error handling web message:', error);
            }
        }

    // 更新内容
    function updateContent(data) {
        const codeElement = document.getElementById('code-content');
        const emptyState = document.getElementById('empty-state');

        if (!data || !data.content) {
            codeElement.style.display = 'none';
            emptyState.style.display = 'flex';
            // 通知C++内容已就绪（空内容）
            postMessageToCpp('contentReady', { width: 400, height: 300 });
            return;
        }

        codeElement.style.display = 'block';
        emptyState.style.display = 'none';

        // 保存当前内容和高亮信息
        currentContent = data.content;
        currentHighlights = data.highlights || [];

        // 设置代码内容
        codeElement.textContent = currentContent;

        // 重新应用语法高亮
        Prism.highlightElement(codeElement);

        // 应用高亮样式
        applyHighlights(codeElement);

        // 计算内容尺寸并通知C++
        const size = getContentSize();
        postMessageToCpp('contentReady', size);
    }

    // 获取内容尺寸（用于FitSize）
    function getContentSize() {
        const codeElement = document.getElementById('code-content');
        const emptyState = document.getElementById('empty-state');

        if (!codeElement || codeElement.style.display === 'none') {
            return { width: 400, height: 300 };
        }

        try {
            // 计算实际内容尺寸
            let maxWidth = 0;
            const lines = currentContent.split('\n');
            
            // 创建一个临时canvas来测量文本宽度
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            context.font = '14px Consolas, Monaco, Lucida Console, monospace';
            
            for (const line of lines) {
                const width = context.measureText(line).width;
                maxWidth = Math.max(maxWidth, width);
            }
            
            const lineHeight = 21; // 14px * 1.5 line-height
            const contentHeight = lines.length * lineHeight;
            
            // 添加容器边距和滚动条空间
            const horizontalPadding = 40;  // 左右边距
            const verticalPadding = 40;    // 上下边距
            const scrollbarSpace = 20;     // 滚动条空间
            
            const width = Math.max(400, maxWidth + horizontalPadding + scrollbarSpace);
            const height = Math.max(200, contentHeight + verticalPadding);
            
            return { 
                width: Math.ceil(width), 
                height: Math.ceil(height) 
            };
        } catch (error) {
            console.error('Error in getContentSize:', error);
            return { width: 400, height: 300 };
        }
    }

        // 应用高亮样式
        function applyHighlights(codeElement) {
            if (!currentHighlights || currentHighlights.length === 0) {
                return;
            }

            // 获取代码文本
            const text = currentContent;
            
            // 创建临时容器
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = codeElement.innerHTML;

            // 处理每个高亮段
            let processedText = '';
            let lastIndex = 0;

            // 按起始位置排序
            const sortedHighlights = [...currentHighlights].sort((a, b) => a.start - b.start);

            for (const highlight of sortedHighlights) {
                const { start, end, type } = highlight;
                
                if (start >= text.length || end > text.length) continue;

                // 添加高亮前的文本
                processedText += escapeHtml(text.substring(lastIndex, start));

                // 添加高亮的文本
                const highlightedText = text.substring(start, end);
                const className = type === 'new' ? 'highlight-new' : 'highlight-both';
                processedText += `<span class="${className}">${escapeHtml(highlightedText)}</span>`;

                lastIndex = end;
            }

            // 添加剩余的文本
            processedText += escapeHtml(text.substring(lastIndex));

            // 更新代码元素的内容
            codeElement.innerHTML = processedText;

            // 重新应用语法高亮
            Prism.highlightElement(codeElement);
        }

        // HTML转义函数
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 发送消息到C++
        function postMessageToCpp(action, data) {
            if (window.chrome.webview) {
                window.chrome.webview.postMessage({
                    action: action,
                    data: data
                });
            }
        }
    </script>
</body>
</html>
